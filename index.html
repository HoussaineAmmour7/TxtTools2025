        _blacklistData: null,
        async checkBlacklistStatus() {
            const inputVal = document.getElementById('blacklistInput').value;
            const rawLines = inputVal.split('\n').map(i => i.trim()).filter(i => i);
            const tableBody = document.getElementById('blacklistTableBody');
            const progressBar = document.getElementById('blacklistProgressBar');
            const statusMessage = document.getElementById('blacklistStatusMessage');

            if (rawLines.length === 0) {
                this.showNotification('Please enter at least one IP or domain.', 'error');
                return;
            }

            // Sanitize each input: try IP first, then domain
            const sanitizedInputs = rawLines.map(raw => {
                const cleanIP = this.sanitizeIP(raw);
                if (cleanIP) return { original: raw, clean: cleanIP, type: 'ip' };
                const cleanDomain = this.sanitizeDomain(raw);
                if (cleanDomain) return { original: raw, clean: cleanDomain, type: 'domain' };
                return { original: raw, clean: null, type: null };
            });

            const validInputs = sanitizedInputs.filter(s => s.clean !== null);
            const skipped = sanitizedInputs.filter(s => s.clean === null);

            if (skipped.length > 0) {
                this.showNotification(`Skipped ${skipped.length} unrecognized input(s): ${skipped.map(s => s.original).join(', ')}`, 'warning');
            }
            if (validInputs.length === 0) {
                this.showNotification('No valid IPs or domains found. Check your input format.', 'error');
                return;
            }

            // DNSBL zones to check (one per column in the table)
            const dnsbls = [
                { name: 'SPAMHAUS',  zone: 'zen.spamhaus.org' },
                { name: 'SORBS',     zone: 'dnsbl.sorbs.net' },
                { name: 'SPAMCOP',   zone: 'bl.spamcop.net' },
                { name: 'BARRACUDA', zone: 'b.barracudacentral.org' },
                { name: 'SURBL',     zone: 'multi.surbl.org' },
                { name: 'GOOGLE SB', zone: 'dbl.spamhaus.org' },
            ];

            // Reverse an IPv4 address for DNSBL lookup (e.g. 1.2.3.4 → 4.3.2.1)
            const reverseIP = (ip) => ip.split('.').reverse().join('.');

            // Perform a single DNSBL A-record lookup via DoH with multi-provider fallback
            const checkDnsbl = async (queryName) => {
                const dohProviders = [
                    (name, type) => `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`,
                    (name, type) => `https://dns.google/resolve?name=${encodeURIComponent(name)}&type=${type}`,
                    (name, type) => `https://doh.opendns.com/dns-query?name=${encodeURIComponent(name)}&type=${type}`,
                ];
                for (const buildUrl of dohProviders) {
                    try {
                        const url = buildUrl(queryName, 'A');
                        const res = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
                        if (!res.ok) continue;
                        const json = await res.json();
                        if (json.Status === 3) return false;  // NXDOMAIN = not listed
                        if (json.Answer && json.Answer.length > 0) return true; // listed
                        return false;
                    } catch {
                        // try next provider
                    }
                }
                return null; // all providers failed
            };

            tableBody.innerHTML = '';
            progressBar.style.width = '0%';
            statusMessage.style.display = 'none';
            this._blacklistData = [];

            let totalClean = 0, totalListed = 0;

            for (let i = 0; i < validInputs.length; i++) {
                const entry = validInputs[i];
                const lookupPrefix = entry.type === 'ip' ? reverseIP(entry.clean) : entry.clean;
                const rowData = { input: entry.clean, results: [] };

                // Run all DNSBL checks in parallel
                const checks = await Promise.all(
                    dnsbls.map(dnsbl => checkDnsbl(`${lookupPrefix}.${dnsbl.zone}`))
                );

                const isAnyListed = checks.some(r => r === true);
                const overallBadge = isAnyListed
                    ? '<span class="status-badge status-error">Listed</span>'
                    : '<span class="status-badge status-good">Clean</span>';

                let cellsHtml = `<td>${this.escapeHtml(entry.clean)}</td><td>${overallBadge}</td>`;
                checks.forEach((result, idx) => {
                    if (result === true) {
                        cellsHtml += '<td><span class="status-badge status-error">Listed</span></td>';
                        rowData.results.push({ dnsbl: dnsbls[idx].name, listed: true });
                    } else if (result === false) {
                        cellsHtml += '<td><span class="status-badge status-good">Clean</span></td>';
                        rowData.results.push({ dnsbl: dnsbls[idx].name, listed: false });
                    } else {
                        cellsHtml += '<td><span class="status-badge status-warning">?</span></td>';
                        rowData.results.push({ dnsbl: dnsbls[idx].name, listed: null });
                    }
                });

                const tr = document.createElement('tr');
                tr.innerHTML = cellsHtml;
                tableBody.appendChild(tr);
                this._blacklistData.push(rowData);

                if (isAnyListed) totalListed++; else totalClean++;
                progressBar.style.width = `${((i + 1) / validInputs.length) * 100}%`;
            }

            document.getElementById('blTotalChecked').textContent = validInputs.length;
            document.getElementById('blClean').textContent = totalClean;
            document.getElementById('blListed').textContent = totalListed;

            statusMessage.textContent = `✔ Check completed — ${validInputs.length} item(s) processed: ${totalClean} clean, ${totalListed} listed.`;
            statusMessage.style.display = 'block';
        },
        exportBlacklistCSV() {
            if (!this._blacklistData || this._blacklistData.length === 0) {
                this.showNotification('No results to export. Run a check first.', 'warning');
                return;
            }
            const dnsbls = ['SPAMHAUS','SORBS','SPAMCOP','BARRACUDA','SURBL','GOOGLE SB'];
            let csv = `IP/Domain,Overall Status,${dnsbls.join(',')}\n`;
            this._blacklistData.forEach(row => {
                const overall = row.results.some(r => r.listed === true) ? 'Listed' : 'Clean';
                const cols = row.results.map(r => r.listed === true ? 'Listed' : r.listed === false ? 'Clean' : 'Unknown');
                csv += `${row.input},${overall},${cols.join(',')}\n`;
            });
            this.downloadFile(csv, 'blacklist_results.csv', 'text/csv;charset=utf-8;');
            this.showNotification('CSV exported successfully.', 'success');
        },
        saveBlacklistResults() {
            if (!this._blacklistData || this._blacklistData.length === 0) {
                this.showNotification('No results to save. Run a check first.', 'warning');
                return;
            }
            const json = JSON.stringify(this._blacklistData, null, 2);
            this.downloadFile(json, 'blacklist_results.json', 'application/json');
            this.showNotification('Results saved as JSON.', 'success');
        },
        loadBlacklistResults() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (!Array.isArray(data)) throw new Error('Invalid format');
                        this._blacklistData = data;
                        const tableBody = document.getElementById('blacklistTableBody');
                        tableBody.innerHTML = '';

        calculateAge() {
            const birthInput = document.getElementById('birthdateInput').value;
            const targetInput = document.getElementById('ageAtDate').value;

            if (!birthInput) {
                this.showNotification('Please enter a valid birthdate.', 'error');
                return;
            }

            const birthDate = new Date(birthInput);
            const targetDate = targetInput ? new Date(targetInput) : new Date();

            if (isNaN(birthDate.getTime())) {
                this.showNotification('Invalid birth date.', 'error');
                return;
            }

            let years = targetDate.getFullYear() - birthDate.getFullYear();
            let months = targetDate.getMonth() - birthDate.getMonth();
            let days = targetDate.getDate() - birthDate.getDate();

            if (days < 0) {
                const lastMonthDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), 0);
                days += lastMonthDate.getDate();
                months--;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            if (years < 0 || (years === 0 && months < 0) || (years === 0 && months === 0 && days < 0)) {
                 document.getElementById('ageResult').textContent = "Target date is before birth date.";
                 return;
            }

            document.getElementById('ageResult').textContent = `Age: ${years} years, ${months} months, and ${days} days`;

        async checkDnsRecords() {

            if (skipped.length > 0) {
                this.showNotification(`Skipped ${skipped.length} invalid domain(s): ${skipped.map(e => e.original).join(', ')}`, 'warning');
            }

            const getQueryName = (domain, type) => {
                if (type === 'DKIM')  return `default._domainkey.${domain}`;
                if (type === 'DMARC') return `_dmarc.${domain}`;

                ];

                for (const url of dohProviders) {

                    for (const line of lines) { const trimmedLine = line.trim(); if (trimmedLine && !emailsToRemove.has(trimmedLine)) { cleanedEmails += trimmedLine + '\n'; } }
                }
                this.elcCleanedBlob = new Blob([cleanedEmails], { type: 'text/plain' }); downloadBtn.disabled = false; statusEl.textContent = `Processing complete. ${emailsToRemove.size} emails checked.`; this.showNotification('File cleaned successfully!', 'success');
            } catch (error) { statusEl.textContent = 'Error: ' + error.message; this.showNotification('Error during processing.', 'error'); } finally { cleanBtn.disabled = false; cleanBtn.innerHTML = '<i class="fas fa-broom"></i> Clean File'; }
        },
        elcDownloadFile() { 
            if (!this.elcCleanedBlob) { this.showNotification('Clean a file first.', 'warning'); return; } 
            try {
                const url = URL.createObjectURL(this.elcCleanedBlob); const a = document.createElement('a'); a.href = url; a.download = 'cleaned_emails.txt'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); 
            } catch(e) {
                this.showNotification('Download failed.', 'error');
            }
        },
        elcClear() { document.getElementById('elcEmailFile').value = ''; document.getElementById('elcEmailsToRemove').value = ''; document.getElementById('elcStatus').textContent = 'Status updates will appear here.'; document.getElementById('elcDownloadBtn').disabled = true; this.elcCleanedBlob = null; this.showNotification('Fields cleared.', 'success'); },
        copyText(elementId) { const element = document.getElementById(elementId); if (element) { const textToCopy = element.value || element.textContent; this.copyToClipboard(textToCopy); } },
        copyToClipboard(text) {
            if (!text) { this.showNotification('Nothing to copy.', 'warning'); return; }
            navigator.clipboard.writeText(text).then(() => { this.showNotification('Copied to clipboard!'); }).catch(() => {
                const textArea = document.createElement('textarea'); textArea.value = text; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); this.showNotification('Copied to clipboard!');
            });
        },
        resetField(elementId) { const element = document.getElementById(elementId); if (element) { if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') { element.value = ''; } else { element.textContent = ''; } } },
        downloadFile(content, fileName, mimeType) { 
            try {
                const blob = new Blob([content], { type: mimeType }); const link = document.createElement("a"); const url = URL.createObjectURL(blob); link.setAttribute("href", url); link.setAttribute("download", fileName); link.style.visibility = 'hidden'; document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url); 
            } catch(e) {
                this.showNotification('Error creating download file.', 'error');
            }
        },
        showNotification(message, type = 'success') {
            const existing = document.querySelector('.notification'); if (existing) existing.remove();
            const notification = document.createElement('div'); notification.className = `notification ${type}`; 
            
            // Add icon based on type
            let icon = '';
            if (type === 'error') { icon = '<i class="fas fa-exclamation-circle"></i>'; notification.style.background = 'var(--error)'; } 
            else if (type === 'warning') { icon = '<i class="fas fa-exclamation-triangle"></i>'; notification.style.background = 'var(--warning)'; } 
            else { icon = '<i class="fas fa-check-circle"></i>'; notification.style.background = 'var(--success)'; }
            
            notification.innerHTML = `${icon} ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => { if (notification.parentNode) { notification.parentNode.removeChild(notification); } }, 3000);
        },
        escapeHtml(text) { 
            const div = document.createElement('div'); 
            div.textContent = text; 
            return div.innerHTML; 
        },
        // Validation & Sanitization Helpers
        // Strip port, whitespace, brackets from raw input and return clean IP string (or null)
        sanitizeIP(raw) {
            if (!raw) return null;
            let s = String(raw).trim();
            // Remove surrounding brackets (IPv6 style, e.g. [1.2.3.4])
            s = s.replace(/^\[|\]$/g, '');
            // Strip port suffix: "1.2.3.4:8080" → "1.2.3.4"
            s = s.replace(/:[\d]+$/, '');
            s = s.trim();
            return this.isValidIP(s) ? s : null;
        },
        // Strip protocol, path, port, whitespace from raw input and return clean domain (or null)
        sanitizeDomain(raw) {
            if (!raw) return null;
            let s = String(raw).trim().toLowerCase();
            // Strip protocol prefixes
            s = s.replace(/^https?:\/\//i, '').replace(/^ftp:\/\//i, '');
            // Strip path/query/hash
            s = s.split('/')[0].split('?')[0].split('#')[0];
            // Strip port
            s = s.replace(/:[\d]+$/, '');
            s = s.trim();
            return this.isValidDomain(s) ? s : null;
        },
        isValidDomain(domain) {
            if (!domain) return false;
            // Allow underscores in labels for DNS record names (e.g. _dmarc.example.com)
            return /^(?!:\/\/)(([a-zA-Z0-9_-]{1,63})\.)+[a-zA-Z]{2,63}$/.test(domain);
        },
        isValidIP(ip) {
            if (!ip) return false;
            return /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/.test(ip.trim());
        }
    };
    window.app = app;
    window.app = app;
    </script>
