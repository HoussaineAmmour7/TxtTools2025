    <style>
    /* ================================================
       TWEAKLY PRO — REDESIGNED UI 2025
       Aesthetic: Dark-first, editorial, precision grid
       Fonts: DM Serif Display + DM Sans
    ================================================ */

    :root {
      --font-serif: 'DM Serif Display', serif;
      --font-sans: 'DM Sans', sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);

      /* Light Theme */
      --bg-base: #F7F6F3;
      --bg-surface: #FFFFFF;
      --bg-raised: #FAFAF8;
      --text-primary: #1A1A18;
      --text-secondary: #6B6B66;
      --text-muted: #9B9B95;
      --border: #E8E7E2;
      --border-focus: #6C63FF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
      --shadow-hover: 0 16px 40px rgba(108,99,255,0.14), 0 4px 12px rgba(0,0,0,0.06);

      --accent: #6C63FF;
      --accent-2: #FF6B6B;
      --accent-3: #06D6A0;
      --accent-light: rgba(108,99,255,0.08);
      --accent-mid: rgba(108,99,255,0.15);

      --success: #06D6A0;
      --success-bg: rgba(6,214,160,0.10);
      --error: #FF6B6B;
      --error-bg: rgba(255,107,107,0.10);
      --warning: #FFB347;
      --warning-bg: rgba(255,179,71,0.10);

      --btn-blue: #3B82F6;
      --btn-blue-hover: #2563EB;
      --btn-red: #FF6B6B;
      --btn-red-hover: #EF4444;
      --btn-green: #06D6A0;
      --btn-green-hover: #059669;

      --header-h: 64px;
      --sidebar-w: 220px;
    }

    [data-theme="dark"] {
      --bg-base: #0F0F0E;
      --bg-surface: #1A1A18;
      --bg-raised: #222220;
      --text-primary: #F0EFE9;
      --text-secondary: #9B9B95;
      --text-muted: #5A5A57;
      --border: #2A2A28;
      --border-focus: #8B82FF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.5);
      --shadow-hover: 0 16px 40px rgba(108,99,255,0.20);

      --accent: #8B82FF;
      --accent-2: #FF8585;
      --accent-3: #22EDB0;
      --accent-light: rgba(139,130,255,0.10);
      --accent-mid: rgba(139,130,255,0.20);

      --success: #22EDB0;
      --success-bg: rgba(34,237,176,0.12);
      --error: #FF8585;
      --error-bg: rgba(255,133,133,0.12);
      --warning: #FFC164;
      --warning-bg: rgba(255,193,100,0.12);

      --btn-blue: #60A5FA;
      --btn-blue-hover: #3B82F6;
      --btn-red: #FF8585;
      --btn-red-hover: #FF6B6B;
      --btn-green: #22EDB0;
      --btn-green-hover: #06D6A0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 4px; }

    ::selection { background: var(--accent-mid); }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ===== LAYOUT ===== */
    .app-shell {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      z-index: 200;
      transition: background var(--transition);
      box-shadow: var(--shadow-sm);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.45rem;
      font-weight: 400;
      color: var(--text-primary);
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      letter-spacing: -0.02em;
      flex-shrink: 0;
      transition: opacity var(--transition);
    }
    .logo:hover { opacity: 0.8; }
    .logo .logo-dot { color: var(--accent); font-style: italic; }

    .header-search {
      flex: 1;
      max-width: 380px;
      margin: 0 auto;
      position: relative;
    }
    .header-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }
    #tool-search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      transition: all var(--transition);
      margin-bottom: 0;
    }
    #tool-search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    #tool-search-input::placeholder { color: var(--text-muted); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: auto;
    }

    .nav-categories {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .category-link {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      transition: all var(--transition);
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid transparent;
      letter-spacing: 0.01em;
    }
    .category-link:hover {
      color: var(--text-primary);
      background: var(--accent-light);
    }
    .category-link.active {
      color: var(--accent);
      background: var(--accent-light);
      border-color: var(--accent-mid);
      font-weight: 600;
    }

    .theme-toggle-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-base);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .theme-toggle-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent-mid);
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      margin-top: var(--header-h);
      padding: 2.5rem 2rem 3rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }
    .main-content { margin-top: calc(var(--header-h) + 0px); }

    /* ===== HERO ===== */
    #hero-section {
      text-align: center;
      padding: 2.5rem 0 2rem;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      border: 1px solid var(--accent-mid);
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 1.25rem;
    }
    #hero-section h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }
    #hero-section h1 em {
      color: var(--accent);
      font-style: italic;
    }
    #hero-section p {
      font-size: 1rem;
      color: var(--text-secondary);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.65;
    }
    .tool-count-badge {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* ===== CATEGORY BAR (mobile fallback) ===== */
    .category-bar-mobile {
      display: none;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .category-bar-mobile::-webkit-scrollbar { display: none; }

    /* ===== TOOL GRID ===== */
    .tools-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .tools-section-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .tools-count {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1rem;
    }

    .tool-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem 1.25rem 1.25rem;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      overflow: hidden;
    }
    .tool-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-light) 0%, transparent 60%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }
    .tool-card:hover {
      border-color: var(--accent-mid);
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }
    .tool-card:hover::before { opacity: 1; }
    .tool-card.hidden { display: none; }

    .tool-card-icon {
      width: 42px; height: 42px;
      background: var(--accent-light);
      border: 1px solid var(--accent-mid);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: all var(--transition);
    }
    .tool-card:hover .tool-card-icon {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .tool-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .tool-card p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      flex: 1;
    }

    .tool-card-arrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.25rem;
    }
    .tool-card-cat {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .tool-card-chevron {
      color: var(--text-muted);
      font-size: 0.75rem;
      transition: transform var(--transition), color var(--transition);
    }
    .tool-card:hover .tool-card-chevron {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* ===== TOOL VIEW ===== */
    #tool-view-container { display: none; }

    .tool-view-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .back-button {
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .back-button:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .tool-view-header-info h2 {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }
    .tool-view-header-info p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .tool-content-wrapper {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow-md);
    }

    /* ===== FORM ELEMENTS ===== */
    textarea,
    input[type="text"],
    input[type="email"],
    input[type="number"],
    input[type="file"],
    input[type="date"],
    input[type="datetime-local"],
    select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.92rem;
      box-sizing: border-box;
      margin-bottom: 1rem;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      line-height: 1.5;
    }
    textarea:focus,
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    input[type="file"]:focus,
    input[type="date"]:focus,
    input[type="datetime-local"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: var(--bg-surface);
    }

    textarea {
      min-height: 140px;
      font-family: 'Menlo', 'Monaco', 'Cascadia Code', monospace;
      font-size: 0.88rem;
      resize: vertical;
      line-height: 1.6;
    }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      outline: none;
      margin-bottom: 1rem;
      padding: 0;
      border: none;
      box-shadow: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--accent-light);
      border: 2px solid white;
      transition: box-shadow var(--transition);
    }
    input[type="range"]:focus::-webkit-slider-thumb {
      box-shadow: 0 0 0 5px var(--accent-light);
    }

    input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
      cursor: pointer;
      margin-bottom: 0;
      margin-right: 6px;
    }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-family: var(--font-sans);
      font-size: 0.88rem;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 2px 8px var(--accent-mid);
    }
    .btn-primary:hover:not(:disabled) {
      background: color-mix(in srgb, var(--accent) 85%, black);
      box-shadow: 0 4px 14px var(--accent-mid);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--accent-light);
      border-color: var(--accent-mid);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-copy {
      background: var(--btn-blue);
      color: white;
    }
    .btn-copy:hover:not(:disabled) {
      background: var(--btn-blue-hover);
      transform: translateY(-1px);
    }

    .btn-reset {
      background: var(--btn-red);
      color: white;
    }
    .btn-reset:hover:not(:disabled) {
      background: var(--btn-red-hover);
      transform: translateY(-1px);
    }

    .btn-send {
      background: var(--btn-green);
      color: white;
      font-size: 1rem;
      padding: 12px 24px;
      box-shadow: 0 2px 8px rgba(6,214,160,0.3);
    }
    .btn-send:hover:not(:disabled) {
      background: var(--btn-green-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(6,214,160,0.4);
    }

    .btn-danger {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid var(--error);
      padding: 8px 14px;
      font-size: 0.85rem;
    }
    .btn-danger:hover { background: var(--error); color: white; }

    .tool-actions-and-options {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }

    /* ===== UTILITY COMPONENTS ===== */
    .result-box {
      background: var(--bg-base);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      margin-top: 1.25rem;
      font-family: 'Menlo', 'Monaco', 'Cascadia Code', monospace;
      font-size: 0.85rem;

      grid-template-columns: 1fr 1fr;

      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);

    .blacklist-table {
      width: 100%;

      font-size: 0.85rem;

      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .results-section {

      border-radius: var(--radius-sm);

      background: var(--bg-base);

      border: 1px solid var(--border);

    .slv-separator-row td { text-align: center; background: var(--bg-surface); font-weight: bold; }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--text-primary);
      color: var(--bg-surface);
      padding: 10px 20px;
      border-radius: 10px;
      box-shadow: var(--shadow-lg);
      z-index: 1000;
      animation: notifSlide 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      max-width: 380px;
      white-space: nowrap;
    }

    @keyframes notifSlide {
      from { transform: translateX(-50%) translateY(80px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    /* ===== SCROLL TOP ===== */
    #scrollTopBtn {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99;

      font-size: 1rem;

      transition: all var(--transition);
      display: none;
      align-items: center;
      justify-content: center;
    }
    #scrollTopBtn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    #scrollTopBtn.visible {
      display: flex !important;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 2.5rem 1.5rem;

      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;

    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;

      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;

    .footer-links { display: flex; gap: 1rem; align-items: center; }

      color: var(--text-muted);

    /* ===== PAGE FADE ANIMATION ===== */
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-animate { animation: pageFadeIn 0.4s ease-out; }

    /* ===== STAGGER CARDS ===== */
    .tool-card:nth-child(1) { animation-delay: 0.02s; }
    .tool-card:nth-child(2) { animation-delay: 0.04s; }
    .tool-card:nth-child(3) { animation-delay: 0.06s; }
    .tool-card:nth-child(4) { animation-delay: 0.08s; }
    .tool-card:nth-child(5) { animation-delay: 0.10s; }
    .tool-card { animation: pageFadeIn 0.4s ease-out both; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .nav-categories { display: none; }
      .category-bar-mobile { display: flex; }
    }

    @media (max-width: 768px) {
      .main-content { padding: 1.5rem 1rem 2rem; }
      .tool-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .converter-container, .generator-layout, .dns-checker-layout, .dns-generator-layout { grid-template-columns: 1fr; }
      .tool-controls { grid-template-columns: 1fr; }

      .tool-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .header-search { display: none; }
    }

    /* ===== VISUALLY HIDDEN ===== */
    .visually-hidden {

    /* ===== CATEGORY COLOR ACCENTS ===== */
    .tool-card[data-category="Text"] .tool-card-icon { background: rgba(108,99,255,0.1); border-color: rgba(108,99,255,0.2); color: #6C63FF; }

    .tool-card[data-category="Network"] .tool-card-icon { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); color: #3B82F6; }
    .tool-card[data-category="Web"] .tool-card-icon { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); color: #F59E0B; }

    .tool-card:hover .tool-card-icon {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: white !important;
    }

    /* Section dividers for grouped tool grid */
    .category-section { margin-bottom: 2.5rem; }
    .category-section-title {
      font-size: 0.75rem;
      font-weight: 700;

      content: '';

      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

        <div id="fakename" class="tool-content" data-name="Fake Identity Generator" data-description="Generate detailed, realistic identities." data-icon="fas fa-user" data-category="Generators"></div>
        <div id="random-text-generator" class="tool-content" data-name="Generate Random Text" data-description="Create paragraphs of random placeholder text." data-icon="fas fa-paragraph" data-category="Generators"></div>
        <div id="random-word-generator" class="tool-content" data-name="Generate Random Words" data-description="Create a list of random words for testing." data-icon="fas fa-file-word" data-category="Generators"></div>
        <div id="emailgenplus" class="tool-content" data-name="Email Generator" data-description="Generate random email addresses for testing." data-icon="fas fa-envelope" data-category="Generators"></div>
        <div id="emaildotgen" class="tool-content" data-name="Email Dot Generator" data-description="Generate all dot variations for Gmail addresses." data-icon="fas fa-sitemap" data-category="Generators"></div>
        <div id="email-plus-randomizer" class="tool-content" data-name="Email Plus Randomizer" data-description="Add random suffixes to emails using +." data-icon="fas fa-plus-square" data-category="Generators"></div>
        <div id="contact-generator" class="tool-content" data-name="Domain Contact Generator" data-description="Generate professional contact info from domain names." data-icon="fas fa-address-book" data-category="Generators"></div>
        <!-- Network Tools -->
        <div id="dns-generator" class="tool-content" data-name="DNS Record Generator" data-description="Generate custom DNS records for multiple domains." data-icon="fas fa-network-wired" data-category="Network"></div>
        <div id="server-mapping" class="tool-content" data-name="Server Mapping Generator" data-description="Generate server mappings from separate inputs." data-icon="fas fa-sitemap" data-category="Network"></div>
        <div id="ip-geolocation" class="tool-content" data-name="IP Geolocation" data-description="Find location details for any IP address." data-icon="fas fa-map-location-dot" data-category="Network"></div>
        <div id="dns-checker" class="tool-content" data-name="DNS Record Checker" data-description="Check DKIM, DMARC, SPF, TXT, CNAME, and more." data-icon="fas fa-tasks" data-category="Network"></div>
        <div id="user-agent" class="tool-content" data-name="What's My User Agent?" data-description="View and analyze your browser's user agent string." data-icon="fas fa-user-secret" data-category="Network"></div>
        <div id="blacklist-monitor" class="tool-content" data-name="Blacklist Monitor" data-description="Check IPs/domains against major DNSBLs." data-icon="fas fa-shield-alt" data-category="Network"></div>
        <!-- Web Tools -->
        <div id="email-list-cleaner" class="tool-content" data-name="Email List Cleaner" data-description="Remove specific emails from a larger list." data-icon="fas fa-broom" data-category="Web"></div>
        <div id="batch-calculator" class="tool-content" data-name="Batch Calculator" data-description="Calculate optimal batch size and interval for sending." data-icon="fas fa-calculator" data-category="Web"></div>
        <div id="ocr" class="tool-content" data-name="Image to Text (OCR)" data-description="Extract text from any image." data-icon="fas fa-image" data-category="Web"></div>
        <div id="imagestopdf" class="tool-content" data-name="Images to PDF" data-description="Combine multiple images into a single PDF." data-icon="fas fa-file-pdf" data-category="Web"></div>
        <div id="htmlviewer" class="tool-content" data-name="HTML Viewer" data-description="Live preview HTML, CSS, and JavaScript." data-icon="fas fa-eye" data-category="Web"></div>
        <div id="domainip" class="tool-content" data-name="Domain/IP Extractor" data-description="Extract domains and IPs from any text." data-icon="fas fa-network-wired" data-category="Web"></div>
        <div id="emailtools" class="tool-content" data-name="Email Extractor" data-description="Extract email addresses from text." data-icon="fas fa-at" data-category="Web"></div>
        <div id="agecalc" class="tool-content" data-name="Age Calculator" data-description="Calculate age from any birthdate." data-icon="fas fa-birthday-cake" data-category="Web"></div>
        <div id="image-map-generator" class="tool-content" data-name="Image Map Generator" data-description="Create clickable areas on images." data-icon="fas fa-map-marked-alt" data-category="Web"></div>
        <!-- Support -->
        <div id="contact-us-form" class="tool-content" data-name="Contact Us" data-description="Have a question or suggestion? Send us a message." data-icon="fas fa-paper-plane" data-category="Support"></div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const toolStorage = document.querySelector('.tool-content-storage');
        const allTools = Array.from(toolStorage.querySelectorAll('.tool-content'));
        const mainGridView = document.getElementById('main-grid-view');
        const toolGrid = document.getElementById('tool-grid');
        const toolViewContainer = document.getElementById('tool-view-container');
        const categoryNav = document.getElementById('category-nav');
        const mobileCategoryBar = document.getElementById('mobile-category-bar');
        const homeLogo = document.getElementById('home-logo');
        const themeToggleBtn = document.getElementById('themeToggle');
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        const searchInput = document.getElementById('tool-search-input');
        const heroSection = document.getElementById('hero-section');
        const visibleCountEl = document.getElementById('visible-count');
        const toolCountBadge = document.getElementById('tool-count');

        const categoryOrder = ['Text', 'Conversion', 'Generators', 'Network', 'Web', 'Support'];
        let currentToolId = null;

        toolCountBadge.textContent = allTools.length;

        // Scroll to top
        window.addEventListener('scroll', () => {
            if (document.documentElement.scrollTop > 200) {
                scrollTopBtn.classList.add('visible');
            } else {
                scrollTopBtn.classList.remove('visible');
            }
        });
        scrollTopBtn.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));

        // Search and filter
        function filterAndSearchTools() {
            const activeCategory = (document.querySelector('.category-link.active') || {}).dataset?.category || 'All';
            const searchTerm = searchInput.value.toLowerCase().trim();
            let visible = 0;
            document.querySelectorAll('.tool-card').forEach(card => {
                const toolName = card.querySelector('h3').textContent.toLowerCase();
                const toolDesc = card.querySelector('p').textContent.toLowerCase();
                const toolCategory = card.dataset.category;
                const catMatch = (activeCategory === 'All' || toolCategory === activeCategory);
                const searchMatch = !searchTerm || toolName.includes(searchTerm) || toolDesc.includes(searchTerm);
                const show = catMatch && searchMatch;
                card.classList.toggle('hidden', !show);
                if (show) visible++;
            });
            if (visibleCountEl) {
                visibleCountEl.textContent = searchTerm || activeCategory !== 'All' ? `${visible} tool${visible !== 1 ? 's' : ''}` : '';
            }
            const sectionTitle = document.querySelector('.tools-section-title');
            if (sectionTitle) {
                sectionTitle.textContent = activeCategory === 'All' ? 'All Tools' : activeCategory + ' Tools';
            }
        }

        function setActiveCategory(cat) {
            document.querySelectorAll('.category-link').forEach(l => {
                l.classList.toggle('active', l.dataset.category === cat);
            });
        }

        function initializeDashboard() {
            const categories = ['All', ...categoryOrder];
            // Desktop nav
            categories.forEach(category => {
                const link = document.createElement('a');
                link.href = '#'; link.className = 'category-link';
                link.textContent = category; link.dataset.category = category;
                link.addEventListener('click', e => {
                    e.preventDefault();
                    setActiveCategory(category);
                    filterAndSearchTools();
                });
                categoryNav.insertBefore(link, themeToggleBtn);
            });
            // Mobile bar
            categories.forEach(category => {
                const link = document.createElement('a');
                link.href = '#'; link.className = 'category-link';
                link.textContent = category; link.dataset.category = category;
                link.addEventListener('click', e => {
                    e.preventDefault();
                    setActiveCategory(category);
                    filterAndSearchTools();
                });
                mobileCategoryBar.appendChild(link);
            });

            // Build tool cards
            allTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.dataset.toolId = tool.id;
                card.dataset.category = tool.dataset.category;
                card.innerHTML = `
                    <div class="tool-card-icon"><i class="${tool.dataset.icon}"></i></div>
                    <h3>${tool.dataset.name}</h3>
                    <p>${tool.dataset.description}</p>
                    <div class="tool-card-arrow">
                        <span class="tool-card-cat">${tool.dataset.category}</span>
                        <i class="fas fa-arrow-right tool-card-chevron"></i>
                    </div>
                `;
                card.addEventListener('click', () => showToolView(tool.id));
                toolGrid.appendChild(card);
            });

            searchInput.addEventListener('input', filterAndSearchTools);
            setActiveCategory('All');
            filterAndSearchTools();
        }

        function showMainGridView() {
            mainGridView.style.display = 'block';
            toolViewContainer.style.display = 'none';
            toolViewContainer.innerHTML = '';
            if (heroSection) heroSection.style.display = 'block';
            if (mobileCategoryBar) mobileCategoryBar.style.display = 'flex';
            currentToolId = null;
            document.querySelector('.tools-section-header').style.display = 'flex';
        }

        function showToolView(toolId) {
            const toolData = allTools.find(t => t.id === toolId);
            if (!toolData) return;
            currentToolId = toolId;

            toolViewContainer.innerHTML = `
                <div class="tool-view-header page-animate">
                    <button class="back-button" aria-label="Go Back"><i class="fas fa-arrow-left"></i></button>
                    <div class="tool-view-header-info">
                        <h2>${toolData.dataset.name}</h2>
                        <p>${toolData.dataset.description}</p>
                    </div>
                </div>
                <div class="tool-content-wrapper page-animate" id="tool-host"></div>
            `;

            const toolHost = document.getElementById('tool-host');
            toolHost.appendChild(createToolInterface(toolId));
            toolViewContainer.querySelector('.back-button').addEventListener('click', showMainGridView);

            mainGridView.style.display = 'none';
            toolViewContainer.style.display = 'block';
            if (heroSection) heroSection.style.display = 'none';
            if (mobileCategoryBar) mobileCategoryBar.style.display = 'none';
            const sectionHdr = document.querySelector('.tools-section-header');
            if (sectionHdr) sectionHdr.style.display = 'none';
            window.scrollTo(0, 0);
            initializeTool(toolId);
        }

        homeLogo.addEventListener('click', e => {
            e.preventDefault();
            showMainGridView();
            setActiveCategory('All');
            searchInput.value = '';
            filterAndSearchTools();
        });

        // Create tool interface
        function createToolInterface(toolId) {
            const container = document.createElement('div');
            container.id = `tool-${toolId}`;
            
            switch(toolId) {
                case 'case':
                    container.innerHTML = `
                        <textarea id="caseInput" placeholder="Enter text here..."></textarea>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.convertCase('upper')"><i class="fas fa-arrow-up"></i> UPPERCASE</button>
                            <button class="btn btn-primary" onclick="app.convertCase('lower')"><i class="fas fa-arrow-down"></i> lowercase</button>
                            <button class="btn btn-secondary" onclick="app.convertCase('title')">Title Case</button>
                            <button class="btn btn-secondary" onclick="app.convertCase('sentence')">Sentence case</button>
                            <button class="btn btn-copy" onclick="app.copyText('caseInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('caseInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                    
                case 'reverse':
                    container.innerHTML = `
                        <textarea id="reverseInput" placeholder="Enter text to reverse..."></textarea>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.reverseText()">Reverse Text</button>
                            <button class="btn btn-secondary" onclick="app.reverseLines()">Reverse Lines</button>
                            <button class="btn btn-copy" onclick="app.copyText('reverseInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('reverseInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                case 'count':
                    container.innerHTML = `
                        <textarea id="countInput" placeholder="Enter text to analyze..." oninput="app.updateCountStats()"></textarea>
                        <div class="stats">
                            <div class="stat-box"><span class="stat-value" id="charCount">0</span><span class="stat-label">Characters</span></div>
                            <div class="stat-box"><span class="stat-value" id="wordCount">0</span><span class="stat-label">Words</span></div>
                            <div class="stat-box"><span class="stat-value" id="lineCount">0</span><span class="stat-label">Lines</span></div>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-copy" onclick="app.copyText('countInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('countInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                case 'line-repeater':
                    container.innerHTML = `
                        <label for="lineRepeaterInput">Enter text:</label>
                        <textarea id="lineRepeaterInput" placeholder="Text to repeat..."></textarea>
                        <label for="lineRepeaterCount">Number of repetitions:</label>
                        <input type="number" id="lineRepeaterCount" min="1" value="5" style="margin-bottom: 0;">
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.repeatLine()">Repeat</button>
                            <button class="btn btn-copy" onclick="app.copyText('lineRepeaterResult')">Copy Result</button>
                        </div>
                        <label for="lineRepeaterResult">Result</label>
                        <textarea id="lineRepeaterResult" placeholder="Result will appear here..." readonly></textarea>
                    `;
                    break;
                case 'duplicate-remover':
                    container.innerHTML = `
                        <textarea id="inputText" placeholder="Enter text with duplicates, one item per line..."></textarea>
                        <div class="stats">
                            <div class="stat-box"><span class="stat-value" id="inputLines">0</span><span class="stat-label">Input Lines</span></div>
                            <div class="stat-box"><span class="stat-value" id="uniqueLines">0</span><span class="stat-label">Unique Lines</span></div>
                            <div class="stat-box"><span class="stat-value" id="duplicateCount">0</span><span class="stat-label">Duplicates</span></div>
                        </div>
                        <div class="tool-controls">
                            <label><input type="checkbox" id="caseSensitive"> Case Sensitive</label>
                            <label><input type="checkbox" id="preserveFirst"> Preserve First Occurrence</label>
                            <label><input type="checkbox" id="sortOutput"> Sort Output</label>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.removeDuplicates()">Remove Duplicates</button>
                            <button class="btn btn-copy" onclick="app.copyText('outputText')"><i class="far fa-copy"></i> Copy Result</button>
                            <button class="btn btn-reset" onclick="app.resetDedupeFields()"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                        <textarea id="outputText" placeholder="Result will appear here..." readonly></textarea>
                    `;
                    break;
                case 'compare':
                    container.innerHTML = `
                        <div class="converter-container">
                            <div>
                                <label>Original Text</label>
                                <textarea id="originalText" placeholder="First text to compare..."></textarea>
                            </div>
                            <div>
                                <label>Modified Text</label>
                                <textarea id="modifiedText" placeholder="Second text to compare..."></textarea>
                            </div>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.compareTexts()">Compare Texts</button>
                            <button class="btn btn-reset" onclick="app.resetCompareFields()"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                        <div id="comparisonResults"></div>
                    `;
                    break;
                case 'orientation':
                    container.innerHTML = `
                        <textarea id="orientationInput" placeholder="Enter text to change orientation..."></textarea>
                        <div class="tool-controls">
                            <label for="orientationSeparator">Separator (for Horizontal):</label>
                            <input type="text" id="orientationSeparator" value="-" placeholder="e.g. - or , or |">
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.convertToHorizontal()">Vertical to Horizontal</button>
                            <button class="btn btn-primary" onclick="app.convertToVertical()">Horizontal to Vertical</button>
                            <button class="btn btn-copy" onclick="app.copyText('orientationInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('orientationInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                case 'textlines':
                    container.innerHTML = `
                        <textarea id="linesInput" placeholder="Enter text, one item per line..."></textarea>
                        <div class="tool-controls">
                            <label><input type="checkbox" id="removeEmptyLines"> Remove Empty Lines</label>
                            <label><input type="checkbox" id="trimLines"> Trim Lines</label>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.processLines()">Process Lines</button>
                            <button class="btn btn-secondary" onclick="app.shuffleLines()">Shuffle Lines</button>
                            <button class="btn btn-secondary" onclick="app.sortLines()">Sort Lines</button>
                            <button class="btn btn-secondary" onclick="app.reverseAllLines()">Reverse Lines</button>
                            <button class="btn btn-copy" onclick="app.copyText('linesInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('linesInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                case 'split-lines-vertically':
                    container.innerHTML = `
                        <div class="info-box" style="margin-top:0;">
                            <h3>Split List into Sections for Export</h3>
                            <p>This tool splits lines of text containing a profile/ID and an email into sections. It's designed to export this data into a two-column (Profile, Email) Excel file (Profile, Email) with section separators.</p>
                        </div>
                        <div class="converter-container">
                            <div>
                                <label for="slv-text">Input Text (e.g., AA1234 john.doe@email.com)</label>
                                <textarea id="slv-text" placeholder="Paste your text here..." style="min-height: 280px;"></textarea>
                                <div class="tool-controls" style="padding: 1rem; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));">
                                    <div>
                                        <label for="slv-chunk" style="margin-bottom: 6px;">Lines per Section</label>
                                        <input type="number" id="slv-chunk" min="1" value="5" />
                                    </div>
                                    <div>
                                        <label for="slv-sepChar" style="margin-bottom: 6px;">Separator Symbol</label>
                                        <input type="text" id="slv-sepChar" value="□" maxlength="1" />
                                    </div>
                                    <div style="align-self: end; margin-bottom: 1rem;">
                                        <label><input type="checkbox" id="slv-skipEmpty" checked> Skip Empty</label>
                                    </div>
                                </div>
                                <div class="tool-actions-and-options" style="margin-top: 0; justify-content: space-between;">
                                    <div>
                                        <button class="btn btn-primary" onclick="app.slvRenderPreview()"><i class="fas fa-eye"></i> Preview</button>
                                        <button class="btn btn-secondary" onclick="app.slvExportExcel()"><i class="fas fa-file-excel"></i> Export Excel</button>
                                    </div>
                                    <div>
                                        <button class="btn btn-copy" onclick="app.slvCopyResult()"><i class="far fa-copy"></i> Copy Raw</button>
                                        <button class="btn btn-reset" onclick="app.slvClear()"><i class="fas fa-times"></i> Clear</button>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label>Preview</label>
                                <div id="slv-preview" class="slv-preview-area">
                                    <p style="color: var(--text-secondary);">Click <b>Preview</b> to see the result.</p>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'textsum':
                    container.innerHTML = `
                        <textarea id="summarizeInput" placeholder="Enter text to summarize..."></textarea>
                        <div class="tool-controls">
                            <label for="summaryLength">Summary Length:</label>
                            <select id="summaryLength">
                                <option value="short">Short (25%)</option>
                                <option value="medium" selected>Medium (50%)</option>
                                <option value="long">Long (75%)</option>
                            </select>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.summarizeText()">Summarize Text</button>
                            <button class="btn btn-copy" onclick="app.copyText('summarizeOutput')"><i class="far fa-copy"></i> Copy Summary</button>
                            <button class="btn btn-reset" onclick="app.resetSummarizeFields()"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                        <textarea id="summarizeOutput" placeholder="Summary will appear here..." readonly></textarea>
                    `;
                    break;
                case 'text-filter':
                    container.innerHTML = `
                        <textarea id="filterInputText" placeholder="Enter text to filter, one item per line..."></textarea>
                        <div class="stats">
                            <div class="stat-box"><span class="stat-value" id="filterInputLines">0</span><span class="stat-label">Input Lines</span></div>
                            <div class="stat-box"><span class="stat-value" id="filterOutputLines">0</span><span class="stat-label">Output Lines</span></div>
                            <div class="stat-box"><span class="stat-value" id="filteredOutLines">0</span><span class="stat-label">Filtered Out</span></div>
                        </div>
                        <div id="filterConditions"></div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-secondary" id="addConditionBtn">Add Condition</button>
                            <button class="btn btn-primary" onclick="app.applyTextFilter()">Apply Filter</button>
                            <button class="btn btn-copy" onclick="app.copyText('filterOutputText')"><i class="far fa-copy"></i> Copy Result</button>
                            <button class="btn btn-reset" onclick="app.resetTextFilter()"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                        <textarea id="filterOutputText" placeholder="Filtered result will appear here..." readonly></textarea>
                    `;
                    break;
                case 'list-partitioner':
                    container.innerHTML = `
                        <label>Input List (one item per line):</label>
                        <textarea id="partitionInput" placeholder="Past Your List Here..."></textarea>
                        <div class="tool-controls">
                            <div>
                                <label for="numberOfPartitions">Number of Partitions:</label>
                                <input type="number" id="numberOfPartitions" min="1" max="100" value="4">
                            </div>
                        </div>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.partitionList()">Partition List</button>
                            <button class="btn btn-reset" onclick="app.resetPartitionFields()"><i class="fas fa-redo"></i> Clear</button>
                        </div>
                        <div id="partitionOutput" class="partition-outputs"></div>
                    `;
                    break;
                case 'arabic-keyboard':
                    container.innerHTML = `
                        <textarea id="arabicOutput" placeholder="...اكتب هنا" style="font-size: 1.5rem; text-align: right;"></textarea>
                         <div class="tool-actions-and-options">
                             <button class="btn btn-copy" onclick="app.copyText('arabicOutput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('arabicOutput')"><i class="fas fa-redo"></i> Clear</button>
                        </div>
                        <div id="arabic-keyboard-layout" class="arabic-keyboard-grid"></div>
                    `;
                    break;
                case 'base64html':
                    container.innerHTML = `
                        <textarea id="base64Input" placeholder="Enter text to encode/decode..."></textarea>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.encodeBase64()">Encode Base64</button>
                            <button class="btn btn-primary" onclick="app.decodeBase64()">Decode Base64</button>
                            <button class="btn btn-secondary" onclick="app.encodeHTML()">Encode HTML</button>
                            <button class="btn btn-secondary" onclick="app.decodeHTML()">Decode HTML</button>
                            <button class="btn btn-copy" onclick="app.copyText('base64Input')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('base64Input')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;
                case 'texthtml':
                    container.innerHTML = `
                        <textarea id="htmlInput" placeholder="Enter text or HTML..."></textarea>
                        <div class="tool-actions-and-options">
                            <button class="btn btn-primary" onclick="app.encodeHTMLSpecial()">Encode Special Chars</button>
                            <button class="btn btn-primary" onclick="app.decodeHTMLSpecial()">Decode Special Chars</button>
                            <button class="btn btn-secondary" onclick="app.stripHTMLTags()">Strip HTML Tags</button>
                            <button class="btn btn-copy" onclick="app.copyText('htmlInput')"><i class="far fa-copy"></i> Copy</button>
                            <button class="btn btn-reset" onclick="app.resetField('htmlInput')"><i class="fas fa-redo"></i> Reset</button>
                        </div>
                    `;
                    break;

            document.documentElement.setAttribute('data-theme', theme);

    // Application functionality object
    const app = {
        excelCsvFile: null,

        // Text Tools
        convertCase(type) {
            const input = document.getElementById('caseInput');
            let text = input.value;
            switch(type) {
                case 'upper': text = text.toUpperCase(); break;
                case 'lower': text = text.toLowerCase(); break;
                case 'title': text = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); break;
                case 'sentence': text = text.toLowerCase().replace(/(^\s*|[.!?]\s+)(\w)/g, (match, p1, p2) => p1 + p2.toUpperCase()); break;
            }
            input.value = text;
        },
        reverseText() {
            const input = document.getElementById('reverseInput');
            input.value = input.value.split('').reverse().join('');
        },
        reverseLines() {
            const input = document.getElementById('reverseInput');
            input.value = input.value.split('\n').reverse().join('\n');
        },
        updateCountStats() {
            const text = document.getElementById('countInput').value;
            const charCount = text.length;
            const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
            const lineCount = text ? text.split('\n').length : 0;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('wordCount').textContent = wordCount;
            document.getElementById('lineCount').textContent = lineCount;
        },
        repeatLine() {
            const textToRepeat = document.getElementById('lineRepeaterInput').value;
            const repeatCount = parseInt(document.getElementById('lineRepeaterCount').value);
            const resultArea = document.getElementById('lineRepeaterResult');
            if (!textToRepeat) { this.showNotification('Please enter some text to repeat.', 'warning'); resultArea.value = ''; return; }
            if (isNaN(repeatCount) || repeatCount < 1) { this.showNotification('Please enter a valid number of repetitions.', 'error'); resultArea.value = ''; return; }
            const singleLineText = textToRepeat.split('\n')[0];
            let result = [];
            for (let i = 0; i < repeatCount; i++) { result.push(singleLineText); }
            resultArea.value = result.join('\n');
        },
        updateDedupeInputStats() {
            const text = document.getElementById('inputText').value;
            const lines = text ? text.split('\n').filter(line => line.trim() !== '') : [];
            const uniqueLines = new Set(lines.map(line => document.getElementById('caseSensitive').checked ? line : line.toLowerCase()));
            document.getElementById('inputLines').textContent = lines.length;
            document.getElementById('uniqueLines').textContent = uniqueLines.size;
            document.getElementById('duplicateCount').textContent = lines.length - uniqueLines.size;
        },
        removeDuplicates() {
            const inputText = document.getElementById('inputText').value;
            const caseSensitive = document.getElementById('caseSensitive').checked;
            const preserveFirst = document.getElementById('preserveFirst').checked;
            const sortOutput = document.getElementById('sortOutput').checked;
            let lines = inputText.split('\n').filter(line => line.trim() !== '');
            let result = [];
            if (preserveFirst) {
                const seen = new Set();
                result = lines.filter(line => {
                    const key = caseSensitive ? line : line.toLowerCase();
                    if (seen.has(key)) { return false; } else { seen.add(key); return true; }
                });
            } else {
                const counts = new Map();
                lines.forEach(line => {
                    const key = caseSensitive ? line : line.toLowerCase();
                    counts.set(key, (counts.get(key) || 0) + 1);
                });
                result = lines.filter(line => {
                    const key = caseSensitive ? line : line.toLowerCase();
                    return counts.get(key) === 1;
                });
            }
            if (sortOutput) {
                result.sort((a, b) => caseSensitive ? a.localeCompare(b) : a.toLowerCase().localeCompare(b.toLowerCase()));
            }
            document.getElementById('outputText').value = result.join('\n');
            this.updateDedupeInputStats();
        },
        resetDedupeFields() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
            document.getElementById('caseSensitive').checked = false;
            document.getElementById('preserveFirst').checked = false;
            document.getElementById('sortOutput').checked = false;
            this.updateDedupeInputStats();
        },
        compareTexts() {
            const original = document.getElementById('originalText').value;
            const modified = document.getElementById('modifiedText').value;
            const originalLines = original.split('\n');
            const modifiedLines = modified.split('\n');
            let html = '<h3>Comparison Results</h3><table class="compare-table">';
            html += '<tr><th>Line</th><th>Original</th><th>Modified</th><th>Status</th></tr>';
            const maxLines = Math.max(originalLines.length, modifiedLines.length);
            for (let i = 0; i < maxLines; i++) {
                const origLine = originalLines[i] || '';
                const modLine = modifiedLines[i] || '';
                let status = 'Unchanged';
                let rowClass = '';
                if (i >= originalLines.length) { status = 'Added'; rowClass = 'diff-line'; } 
                else if (i >= modifiedLines.length) { status = 'Removed'; rowClass = 'diff-line'; } 
                else if (origLine !== modLine) { status = 'Modified'; rowClass = 'diff-line'; }
                html += `<tr class="${rowClass}"><td>${i + 1}</td><td>${this.escapeHtml(origLine)}</td><td>${this.escapeHtml(modLine)}</td><td>${status}</td></tr>`;
            }
            html += '</table>';
            document.getElementById('comparisonResults').innerHTML = html;
        },
        resetCompareFields() {
            document.getElementById('originalText').value = '';
            document.getElementById('modifiedText').value = '';
            document.getElementById('comparisonResults').innerHTML = '';
        },
        convertToVertical() {
            const input = document.getElementById('orientationInput');
            const separator = document.getElementById('orientationSeparator').value || '-';
            input.value = input.value.split(separator).join('\n');
        },
        convertToHorizontal() {
            const input = document.getElementById('orientationInput');
            const separator = document.getElementById('orientationSeparator').value || '-';
            input.value = input.value.split('\n').join(separator);
        },
        processLines() {
            const input = document.getElementById('linesInput');
            let lines = input.value.split('\n');
            if (document.getElementById('removeEmptyLines').checked) { lines = lines.filter(line => line.trim() !== ''); }
            if (document.getElementById('trimLines').checked) { lines = lines.map(line => line.trim()); }
            input.value = lines.join('\n');
        },
        shuffleLines() {
            const input = document.getElementById('linesInput');
            let lines = input.value.split('\n');
            for (let i = lines.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [lines[i], lines[j]] = [lines[j], lines[i]]; }
            input.value = lines.join('\n');
        },
        sortLines() {
            const input = document.getElementById('linesInput');
            let lines = input.value.split('\n');
            lines.sort();
            input.value = lines.join('\n');
        },
        reverseAllLines() {
            const input = document.getElementById('linesInput');
            input.value = input.value.split('\n').reverse().join('\n');
        },
        slvPrepareData() {
            const rawText = document.getElementById('slv-text').value;
            const skipEmpty = document.getElementById('slv-skipEmpty').checked;
            const sep = (document.getElementById('slv-sepChar').value || '□').slice(0, 1);
            const chunkSize = Math.max(1, parseInt(document.getElementById('slv-chunk').value || '1', 10));
            let lines = rawText.replace(/\r\n?/g, '\n').split('\n');
            if (skipEmpty) { lines = lines.filter(s => s.trim().length > 0); }
            const emailRegex = /\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b/;
            const lineData = lines.map(line => {
                const match = line.match(emailRegex);
                let email = '';
                let profile = line.trim();
                if (match) { email = match[0]; profile = line.replace(email, '').trim(); }
                return { profile, email };
            });
            const groups = [];
            for (let i = 0; i < lineData.length; i += chunkSize) { groups.push(lineData.slice(i, i + chunkSize)); }
            return { groups, sep };
        },
        slvRenderPreview() {
            const previewContainer = document.getElementById('slv-preview');
            const { groups, sep } = this.slvPrepareData();
            previewContainer.innerHTML = '';
            if (groups.length === 0) { previewContainer.innerHTML = `<p style="color: var(--text-secondary);">No data to display.</p>`; return; }
            let tableHtml = '<table class="slv-preview-table"><thead><tr><th>Profile</th><th>Email</th></tr></thead><tbody>';
            groups.forEach((group, groupIndex) => {
                group.forEach(line => { tableHtml += `<tr><td>${this.escapeHtml(line.profile)}</td><td>${this.escapeHtml(line.email)}</td></tr>`; });
                if (groupIndex < groups.length - 1) { tableHtml += `<tr class="slv-separator-row"><td colspan="2">${this.escapeHtml(sep)}</td></tr>`; }
            });
            tableHtml += '</tbody></table>';
            previewContainer.innerHTML = tableHtml;

        summarizeText() {
            const input = document.getElementById('summarizeInput').value;
            const length = document.getElementById('summaryLength').value;
            if (!input.trim()) { this.showNotification('Please enter some text to summarize.', 'error'); return; }
            const sentences = input.match(/[^.!?]+[.!?]+/g) || [];
            if (sentences.length === 0) { document.getElementById('summarizeOutput').value = input; return; }
            const wordFreq = {};
            const words = input.toLowerCase().match(/\b\w+\b/g) || [];
            words.forEach(word => { wordFreq[word] = (wordFreq[word] || 0) + 1; });
            const sentenceScores = sentences.map((sentence, index) => {
                const sentenceWords = sentence.toLowerCase().match(/\b\w+\b/g) || [];
                let score = 0;
                sentenceWords.forEach(word => { score += wordFreq[word] || 0; });
                return { sentence, score: score / sentenceWords.length || 0, index };
            });
            sentenceScores.sort((a, b) => b.score - a.score);
            let summaryLength;
            switch(length) {
                case 'short': summaryLength = Math.max(1, Math.floor(sentences.length * 0.25)); break;
                case 'medium': summaryLength = Math.max(1, Math.floor(sentences.length * 0.5)); break;
                case 'long': summaryLength = Math.max(1, Math.floor(sentences.length * 0.75)); break;
                default: summaryLength = Math.max(1, Math.floor(sentences.length * 0.5));
            }
            const topSentences = sentenceScores.slice(0, summaryLength);
            topSentences.sort((a, b) => a.index - b.index);
            const summary = topSentences.map(item => item.sentence.trim()).join(' ');
            document.getElementById('summarizeOutput').value = summary;
        },

        applyTextFilter() {
            const inputText = document.getElementById('filterInputText').value;
            const lines = inputText.split('\n').filter(Boolean);
            const conditions = [];
            document.querySelectorAll('#filterConditions .tool-controls').forEach(conditionDiv => {
                const conditionType = conditionDiv.querySelector('select').value;
                const conditionValue = conditionDiv.querySelector('input').value;
                if (conditionValue) { conditions.push({ type: conditionType, value: conditionValue }); }
            });
            if (conditions.length === 0) { document.getElementById('filterOutputText').value = inputText; this.updateFilterInputStats(); return; }
            const filteredLines = lines.filter(line => {
                return conditions.every(condition => {
                    switch(condition.type) {
                        case 'contains': return line.includes(condition.value);
                        case 'notContains': return !line.includes(condition.value);
                        case 'startsWith': return line.startsWith(condition.value);
                        case 'endsWith': return line.endsWith(condition.value);
                        case 'equals': return line === condition.value;
                        case 'lengthGreater': return line.length > parseInt(condition.value);
                        case 'lengthLess': return line.length < parseInt(condition.value);
                        default: return true;
                    }
                });
            });
            document.getElementById('filterOutputText').value = filteredLines.join('\n');
            this.updateFilterInputStats();
        },

        async convertCurrency() {
            const amount = document.getElementById('currencyAmount').value;
            const from = document.getElementById('fromCurrency').value;
            const to = document.getElementById('toCurrency').value;
            const resultBox = document.getElementById('currencyResult');
            if (!amount) { this.showNotification('Please enter an amount.', 'error'); return; }
            if (from === to) { resultBox.textContent = `${parseFloat(amount).toFixed(2)} ${from} = ${parseFloat(amount).toFixed(2)} ${to}`; return; }
            resultBox.textContent = 'Converting...';
            try {
                let rate = null;
                // Try primary API
                try {
                    const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.result === "success" && data.rates && data.rates[to]) {
                            rate = data.rates[to];
                        }
                    }
                } catch(_) {}
                // Fallback to exchangerate.host
                if (rate === null) {
                    const response2 = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
                    if (response2.ok) {
                        const data2 = await response2.json();
                        if (data2.rates && data2.rates[to]) rate = data2.rates[to];
                    }
                }
                if (rate !== null) {
                    const result = (amount * rate).toFixed(2);
                    resultBox.textContent = `${amount} ${from} = ${result} ${to}`;
                } else { throw new Error('Currency rate not found in any API response.'); }
            } catch (e) { console.error("Currency conversion error:", e); this.showNotification('Could not fetch exchange rates. Please try again later.', 'error'); resultBox.textContent = ''; }
